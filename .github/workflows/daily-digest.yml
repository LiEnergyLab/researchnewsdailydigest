name: Daily research digest

on:
  schedule:
    # 21:00 UTC = 07:00 AEST (UTC+10) — adjust to taste.
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # also runnable manually from the Actions tab

permissions:
  contents: write   # needed to push digests/YYYY-MM-DD.md back to the repo

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore private config
        # config.yaml is gitignored (contains private RSS feeds + tracked authors).
        # Store the base64-encoded file as the CONFIG_YAML repository secret.
        # Generate it locally with:  base64 -i config.yaml | pbcopy
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: echo "$CONFIG_YAML" | base64 -d > config.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run digest bot
        env:
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          OPENALEX_MAILTO:    ${{ secrets.OPENALEX_MAILTO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.bot

      - name: Commit digest file (fallback)
        # delivery.py already commits + pushes the file during the bot run.
        # This step is a safety net in case that push was skipped or failed.
        run: |
          git add digests/
          if git diff --cached --quiet; then
            echo "Digest already committed by bot — nothing to do."
          else
            git commit -m "digest: $(date -u +%Y-%m-%d)"
            git push
          fi
